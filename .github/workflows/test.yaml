name: Build Ceph

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      launchpad_owner:
        description: Launchpad owner namespace for the ceph source repo
        required: false
        default: lmlogiudice
  schedule:
    - cron: '0 5 * * 1'  # Weekly on Mondays at 05:00 UTC

jobs:
  build:
    name: Build Ceph (${{ matrix.name }})
    runs-on: [ubuntu-latest]
    env:
      UBUNTU_BRANCH: ${{ matrix.ubuntu_branch }}
      DEBIAN_REF: ${{ matrix.debian_ref }}
      CEPH_VERSION: ${{ matrix.ceph_version }}
      LAUNCHPAD_OWNER: ${{ github.event.inputs.launchpad_owner || 'lmlogiudice' }}
      BASH_ENV: ${{ github.workspace }}/lxd.sh
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: resolute
            lxd_image: ubuntu-daily:resolute
            ubuntu_branch: ubuntu/resolute
            debian_ref: origin/ubuntu/latest
            ceph_version: 20.2.0
          - name: noble
            lxd_image: ubuntu:24.04
            ubuntu_branch: ubuntu/noble
            debian_ref: origin/ubuntu/noble
            ceph_version: 19.2.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 10
        with:
          detached: true

      - name: Install and initialize LXD
        run: |
          sudo snap install lxd
          sudo lxd init --auto
          sudo iptables -P FORWARD ACCEPT
          sudo usermod -aG lxd $USER
          newgrp lxd

      - name: Launch Ubuntu container
        run: |
          lxd_launch_and_wait ${{ matrix.lxd_image }} ceph-build

      - name: Push build script to container
        run: |
          lxd_push_file build.sh ceph-build root/build.sh

      - name: Install dependencies
        run: |
          lxd_exec_build_stage ceph-build 'set -eux; source /root/build.sh; cd /root; install_dependencies'

      - name: Prepare tarball
        run: |
          lxd_exec_build_stage ceph-build 'set -eux; source /root/build.sh; cd /root; prepare_tarball'

      - name: Install build requirements
        run: |
          lxd_exec_build_stage ceph-build 'set -eux; source /root/build.sh; cd /root/ceph; install_build_requirements'

      - name: Build package
        run: |
          lxd_exec_build_stage ceph-build 'set -eux; source /root/build.sh; cd /root/ceph; build'
